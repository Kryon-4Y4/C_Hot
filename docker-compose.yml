version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: phone-parts-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-phone_parts_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-layer/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - phone-parts-network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: phone-parts-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - phone-parts-network

  # Data Layer: 共享数据层 (作为基础镜像构建)
  data-layer:
    build:
      context: ./data-layer
      dockerfile: Dockerfile
    image: phone-parts/data-layer:latest
    container_name: phone-parts-data-layer
    # 此服务不启动，仅作为基础镜像
    entrypoint: ["echo", "Data layer base image built"]
    networks:
      - phone-parts-network

  # API 网关服务
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: phone-parts-api
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-phone_parts_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      data-layer:
        condition: service_completed_successfully
    volumes:
      - ./crawler:/app/crawler:ro
    networks:
      - phone-parts-network

  # 任务调度器 - Celery Worker
  task-scheduler:
    build:
      context: ./task-scheduler
      dockerfile: Dockerfile
    container_name: phone-parts-scheduler
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-phone_parts_db}
      - REDIS_URL=redis://redis:6379/0
      - API_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      - api-gateway
      - redis
      - postgres
      - data-layer
    volumes:
      - ./crawler:/app/crawler:ro
    networks:
      - phone-parts-network

  # 定时任务调度器 - Celery Beat
  task-scheduler-beat:
    build:
      context: ./task-scheduler
      dockerfile: Dockerfile.beat
    container_name: phone-parts-scheduler-beat
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-phone_parts_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - data-layer
    networks:
      - phone-parts-network

  # 用户门户 - React前端
  user-portal:
    build:
      context: ./user-portal
      dockerfile: Dockerfile
    container_name: phone-parts-portal
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - phone-parts-network

  # 管理控制台 - Flask Admin
  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
    container_name: phone-parts-admin
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-phone_parts_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - API_GATEWAY_URL=http://api-gateway:8000
    ports:
      - "5000:5000"
    depends_on:
      - api-gateway
      - postgres
      - redis
      - data-layer
    networks:
      - phone-parts-network

  # 运维中心
  ops-center:
    build:
      context: ./ops-center
      dockerfile: Dockerfile
    container_name: phone-parts-ops
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-phone_parts_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - API_GATEWAY_URL=http://api-gateway:8000
    ports:
      - "8001:8001"
    depends_on:
      - api-gateway
      - postgres
      - redis
      - data-layer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - phone-parts-network

  # 文档站点
  documentation:
    build:
      context: ./documentation
      dockerfile: Dockerfile
    container_name: phone-parts-docs
    ports:
      - "8080:80"
    networks:
      - phone-parts-network

volumes:
  postgres_data:
  redis_data:

networks:
  phone-parts-network:
    driver: bridge
