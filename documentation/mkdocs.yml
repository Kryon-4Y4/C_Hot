site_name: 手机维修配件外贸数据系统 API文档
site_description: 完整的API接口文档
site_author: Matrix Agent

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - API文档:
    - 认证: api/auth.md
    - 外贸数据: api/trade-data.md
    - 爬虫管理: api/crawler.md
    - 用户管理: api/users.md
    - 系统: api/system.md
  - 数据模型: models.md
  - 部署指南: deployment.md
  - 常见问题: faq.md
